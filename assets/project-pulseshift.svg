<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" role="img" aria-label="PulseShift app interface">
  <defs>
    <linearGradient id="page-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf4eb"/>
      <stop offset="100%" stop-color="#f0e4d4"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="0" cy="0" r="1">
      <stop offset="0%" stop-color="#cc5b2f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#cc5b2f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="1" cy="0" r="1">
      <stop offset="0%" stop-color="#2d6a73" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2d6a73" stop-opacity="0"/>
    </radialGradient>
    <filter id="card-shadow" x="-4%" y="-4%" width="108%" height="118%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1d2425" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="560" height="340" fill="url(#page-bg)"/>
  <rect width="560" height="340" fill="url(#glow-left)"/>
  <rect width="560" height="340" fill="url(#glow-right)"/>

  <!-- Hero left card -->
  <rect x="16" y="16" width="316" height="130" rx="16" fill="#f8f1e7" filter="url(#card-shadow)" stroke="rgba(255,255,255,0.7)" stroke-width="1"/>
  <text x="32" y="40" font-family="'Avenir Next', 'Gill Sans', sans-serif" font-size="8" font-weight="700" letter-spacing="1.5" fill="#cc5b2f" text-transform="uppercase">PULSESHIFT</text>
  <text x="32" y="58" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#1d2425">Organizer-first climate</text>
  <text x="32" y="74" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#1d2425">session retention</text>
  <text x="32" y="95" font-family="Georgia, serif" font-size="9" fill="#526168">Score climate-driven suppression risk and rank</text>
  <text x="32" y="108" font-family="Georgia, serif" font-size="9" fill="#526168">the safest adaptations for any planned session.</text>
  <!-- Status pill -->
  <rect x="32" y="120" width="80" height="16" rx="8" fill="#2d6a73" opacity="0.15"/>
  <text x="72" y="131" font-family="'Avenir Next', sans-serif" font-size="7.5" fill="#2d6a73" font-weight="700" text-anchor="middle">NOAA · AirNow live</text>

  <!-- Hero right panel (teal) -->
  <rect x="344" y="16" width="200" height="130" rx="16" fill="#2d6a73" filter="url(#card-shadow)"/>
  <text x="360" y="38" font-family="'Avenir Next', sans-serif" font-size="7" font-weight="700" letter-spacing="1.2" fill="rgba(246,247,242,0.7)">CURRENT SCOPE</text>
  <g font-family="Georgia, serif" font-size="9.5" fill="#f6f7f2">
    <text x="360" y="58">· Heat and smoke risk</text>
    <text x="360" y="74">· Outdoor run groups</text>
    <text x="360" y="90">· Safe action ranking</text>
    <text x="360" y="106">· RAM metric audit</text>
  </g>
  <rect x="358" y="118" width="68" height="18" rx="9" fill="rgba(246,198,166,0.25)" stroke="#f6c6a6" stroke-width="1"/>
  <text x="392" y="130" font-family="'Avenir Next', sans-serif" font-size="7.5" fill="#f6c6a6" font-weight="700" text-anchor="middle">SQLite · Postgres</text>

  <!-- Form panel -->
  <rect x="16" y="160" width="528" height="164" rx="16" fill="#f8f1e7" filter="url(#card-shadow)" stroke="rgba(255,255,255,0.7)" stroke-width="1"/>
  <text x="32" y="182" font-family="'Avenir Next', sans-serif" font-size="8" font-weight="700" letter-spacing="1.2" fill="#526168">PLANNED SESSION</text>

  <!-- Field row 1 -->
  <g font-family="'Avenir Next', sans-serif">
    <!-- Field 1 -->
    <rect x="32" y="192" width="112" height="34" rx="8" fill="#efe2cf" stroke="rgba(28,36,37,0.1)" stroke-width="1"/>
    <text x="40" y="204" font-size="6.5" fill="#526168" font-weight="700">SESSION NAME</text>
    <text x="40" y="218" font-size="8.5" fill="#1d2425" font-family="Georgia, serif">Tuesday club run</text>
    <!-- Field 2 -->
    <rect x="152" y="192" width="80" height="34" rx="8" fill="#efe2cf" stroke="rgba(28,36,37,0.1)" stroke-width="1"/>
    <text x="160" y="204" font-size="6.5" fill="#526168" font-weight="700">START TIME</text>
    <text x="160" y="218" font-size="8.5" fill="#1d2425" font-family="Georgia, serif">18:00</text>
    <!-- Field 3 -->
    <rect x="240" y="192" width="80" height="34" rx="8" fill="#efe2cf" stroke="rgba(28,36,37,0.1)" stroke-width="1"/>
    <text x="248" y="204" font-size="6.5" fill="#526168" font-weight="700">DURATION</text>
    <text x="248" y="218" font-size="8.5" fill="#1d2425" font-family="Georgia, serif">60 min</text>
    <!-- Field 4 -->
    <rect x="328" y="192" width="80" height="34" rx="8" fill="#efe2cf" stroke="rgba(28,36,37,0.1)" stroke-width="1"/>
    <text x="336" y="204" font-size="6.5" fill="#526168" font-weight="700">EFFORT</text>
    <text x="336" y="218" font-size="8.5" fill="#1d2425" font-family="Georgia, serif">Moderate</text>
    <!-- Field 5 -->
    <rect x="416" y="192" width="112" height="34" rx="8" fill="#efe2cf" stroke="rgba(28,36,37,0.1)" stroke-width="1"/>
    <text x="424" y="204" font-size="6.5" fill="#526168" font-weight="700">TEMP / HUMIDITY</text>
    <text x="424" y="218" font-size="8.5" fill="#1d2425" font-family="Georgia, serif">96°F · 62%</text>
  </g>

  <!-- Field row 2 -->
  <g font-family="'Avenir Next', sans-serif">
    <rect x="32" y="234" width="80" height="34" rx="8" fill="#efe2cf" stroke="rgba(28,36,37,0.1)" stroke-width="1"/>
    <text x="40" y="246" font-size="6.5" fill="#526168" font-weight="700">AQI</text>
    <text x="40" y="260" font-size="8.5" fill="#1d2425" font-family="Georgia, serif">92 · Moderate</text>

    <rect x="120" y="234" width="80" height="34" rx="8" fill="#efe2cf" stroke="rgba(28,36,37,0.1)" stroke-width="1"/>
    <text x="128" y="246" font-size="6.5" fill="#526168" font-weight="700">SMOKE ALERT</text>
    <text x="128" y="260" font-size="8.5" fill="#1d2425" font-family="Georgia, serif">No</text>

    <!-- Risk score card -->
    <rect x="216" y="234" width="140" height="34" rx="8" fill="#cc5b2f" opacity="0.12" stroke="#cc5b2f" stroke-width="1" stroke-opacity="0.4"/>
    <text x="224" y="246" font-size="6.5" fill="#cc5b2f" font-weight="700">SESSION RISK SCORE</text>
    <text x="224" y="260" font-size="8.5" fill="#cc5b2f" font-family="Georgia, serif" font-weight="700">High — adapt required</text>

    <!-- Action pill -->
    <rect x="364" y="234" width="164" height="34" rx="8" fill="#2d6a73"/>
    <text x="446" y="246" font-size="6.5" fill="rgba(246,247,242,0.75)" font-weight="700" text-anchor="middle">TOP RECOMMENDATION</text>
    <text x="446" y="260" font-size="8.5" fill="#f6f7f2" font-family="Georgia, serif" text-anchor="middle">Start 45 min earlier</text>
  </g>
</svg>
